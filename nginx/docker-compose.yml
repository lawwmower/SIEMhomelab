# ============================================================================
# Nginx Reverse Proxy — TLS Termination & Dashboard Access
# ============================================================================
# Provides HTTPS access to all SIEM dashboards on port 443.
# ============================================================================

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    hostname: nginx-proxy
    restart: unless-stopped
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "443:443"
      - "80:80"
    networks:
      - siem-net
    depends_on:
      - splunk
      - wazuh-dashboard
      - thehive
    healthcheck:
      test: [ "CMD-SHELL", "curl -skf https://localhost/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  siem-net:
    external: true
