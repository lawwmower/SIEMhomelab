# ============================================================================
# Nginx Configuration — SIEM Homelab Reverse Proxy
# ============================================================================
# Routes:
#   /            → Landing page (list of services)
#   /wazuh/      → Wazuh Dashboard (5601)
#   /splunk/     → Splunk Web (8000)
#   /thehive/    → TheHive (9000)
#   /misp/       → MISP (8443)
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ---------- Upstream Backends ----------
    upstream wazuh_dashboard {
        server wazuh-dashboard:5601;
    }

    upstream splunk_web {
        server splunk:8000;
    }

    upstream thehive_app {
        server thehive:9000;
    }

    upstream misp_app {
        server misp:443;
    }

    # ---------- HTTP → HTTPS Redirect ----------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---------- HTTPS Server ----------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---------- Landing Page ----------
        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEM Homelab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 2rem; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #3a7bd5;
            box-shadow: 0 8px 32px rgba(58,123,213,0.3);
        }
        .card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .card h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .card p { font-size: 0.85rem; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#128737; SIEM Homelab</h1>
        <p class="subtitle">Security Information &amp; Event Management</p>
        <div class="grid">
            <a href="/wazuh/" class="card">
                <div class="icon">&#128737;</div>
                <h2>Wazuh</h2>
                <p>Host IDS &bull; Log Analysis &bull; Vulnerability Detection</p>
            </a>
            <a href="/splunk/" class="card">
                <div class="icon">&#128269;</div>
                <h2>Splunk</h2>
                <p>SIEM Analytics &bull; Search &bull; Correlation</p>
            </a>
            <a href="/thehive/" class="card">
                <div class="icon">&#128029;</div>
                <h2>TheHive</h2>
                <p>Incident Response &bull; Case Management</p>
            </a>
            <a href="/misp/" class="card">
                <div class="icon">&#127760;</div>
                <h2>MISP</h2>
                <p>Threat Intelligence &bull; IOC Sharing</p>
            </a>
        </div>
    </div>
</body>
</html>';
        }

        # ---------- Wazuh Dashboard ----------
        location /wazuh/ {
            proxy_pass https://wazuh_dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ---------- Splunk Web ----------
        location /splunk/ {
            proxy_pass http://splunk_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ---------- TheHive ----------
        location /thehive/ {
            proxy_pass http://thehive_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ---------- MISP ----------
        location /misp/ {
            proxy_pass https://misp_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_buffering off;
        }
    }
}
