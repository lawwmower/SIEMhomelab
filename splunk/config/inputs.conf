# ============================================================================
# Splunk inputs.conf — Data Inputs Configuration
# ============================================================================
# Monitors Wazuh alerts JSON and enables HEC for external log sources.
# ============================================================================

# ---------- HTTP Event Collector ----------
[http]
disabled = 0
enableSSL = 1
port = 8088

[http://wazuh_alerts]
disabled = 0
token = a1b2c3d4-e5f6-7890-abcd-ef1234567890
index = wazuh
sourcetype = wazuh_alerts

# ---------- Monitor Wazuh Alerts JSON ----------
[monitor:///opt/splunk/wazuh-alerts/alerts.json]
disabled = false
index = wazuh
sourcetype = wazuh_alerts
host = wazuh-manager

# ---------- Monitor Wazuh Archives ----------
[monitor:///opt/splunk/wazuh-alerts/archives.json]
disabled = false
index = wazuh-archives
sourcetype = wazuh_archives
host = wazuh-manager
