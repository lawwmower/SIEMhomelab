# ============================================================================
# Wazuh Stack — Indexer + Manager + Dashboard
# ============================================================================

services:
  # ---------- Wazuh Indexer (OpenSearch) ----------
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.2
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    restart: unless-stopped
    environment:
      - OPENSEARCH_JAVA_OPTS=${INDEXER_JAVA_OPTS:--Xms1g -Xmx1g}
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${INDEXER_PASSWORD:-SecretPassword!2025}
      - bootstrap.memory_lock=true
      - node.name=wazuh-indexer
      - cluster.name=wazuh-cluster
      - discovery.type=single-node
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=/usr/share/wazuh-indexer/certs/wazuh-indexer.pem
      - plugins.security.ssl.http.pemkey_filepath=/usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=/usr/share/wazuh-indexer/certs/root-ca.pem
      - plugins.security.ssl.transport.pemcert_filepath=/usr/share/wazuh-indexer/certs/wazuh-indexer.pem
      - plugins.security.ssl.transport.pemkey_filepath=/usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=/usr/share/wazuh-indexer/certs/root-ca.pem
      - plugins.security.authcz.admin_dn=CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US
      - plugins.security.nodes_dn=CN=wazuh-indexer,OU=Wazuh,O=Wazuh,L=California,C=US
      - plugins.security.check_snapshot_restore_write_privileges=true
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
      - compatibility.override_main_response_version=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - wazuh-indexer-certs:/usr/share/wazuh-indexer/certs
    ports:
      - "9200:9200"
    networks:
      - siem-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sku ${INDEXER_USERNAME:-admin}:${INDEXER_PASSWORD:-SecretPassword!2025} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------- Wazuh Manager ----------
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: wazuh-manager
    hostname: wazuh-manager
    restart: unless-stopped
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=${INDEXER_USERNAME:-admin}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:-SecretPassword!2025}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat-key.pem
      - API_USERNAME=${WAZUH_API_USER:-wazuh-wui}
      - API_PASSWORD=${WAZUH_API_PASSWORD:-MyS3cr37P450worD!}
    volumes:
      - wazuh-manager-api:/var/ossec/api/configuration
      - wazuh-manager-etc:/var/ossec/etc
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-queue:/var/ossec/queue
      - wazuh-manager-var-multigroups:/var/ossec/var/multigroups
      - wazuh-manager-integrations:/var/ossec/integrations
      - wazuh-manager-active-response:/var/ossec/active-response/bin
      - wazuh-manager-agentless:/var/ossec/agentless
      - wazuh-manager-wodles:/var/ossec/wodles
      - wazuh-filebeat-etc:/etc/filebeat
      - wazuh-filebeat-var:/var/lib/filebeat
      - wazuh-indexer-certs:/etc/ssl:ro
      - suricata-logs:/var/ossec/logs/suricata:ro
      - wazuh-alerts:/var/ossec/logs/alerts
      - ./config/wazuh_cluster/wazuh_manager.conf:/var/ossec/etc/ossec.conf:ro
    ports:
      - "1514:1514" # Agent communication
      - "1515:1515" # Agent enrollment
      - "55000:55000" # Wazuh API
      - "514:514/udp" # Syslog collection
    networks:
      - siem-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sk https://localhost:55000/security/user/authenticate -u ${WAZUH_API_USER:-wazuh-wui}:${WAZUH_API_PASSWORD:-MyS3cr37P450worD!} | grep -q token || /var/ossec/bin/wazuh-control status | grep -q 'is running'" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ---------- Wazuh Dashboard ----------
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    restart: unless-stopped
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_started
    environment:
      - INDEXER_USERNAME=${INDEXER_USERNAME:-admin}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:-SecretPassword!2025}
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-kibanaserver}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-kibanaserver}
      - API_USERNAME=${WAZUH_API_USER:-wazuh-wui}
      - API_PASSWORD=${WAZUH_API_PASSWORD:-MyS3cr37P450worD!}
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - SERVER_SSL_KEY=/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - OPENSEARCH_HOSTS=https://wazuh-indexer:9200
    volumes:
      - wazuh-dashboard-certs:/usr/share/wazuh-dashboard/certs
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    ports:
      - "5601:5601"
    networks:
      - siem-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sk https://localhost:5601/api/status | grep -q available || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  wazuh-indexer-data:
  wazuh-indexer-certs:
  wazuh-manager-api:
  wazuh-manager-etc:
  wazuh-manager-logs:
  wazuh-manager-queue:
  wazuh-manager-var-multigroups:
  wazuh-manager-integrations:
  wazuh-manager-active-response:
  wazuh-manager-agentless:
  wazuh-manager-wodles:
  wazuh-filebeat-etc:
  wazuh-filebeat-var:
  wazuh-dashboard-certs:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:


networks:
  siem-net:
    external: true
